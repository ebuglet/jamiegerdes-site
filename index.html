<html>
<head>
<title>www.jamiegerdes.com</title>

<style type="text/css">
/* Center the container in the middle of the browser */
body {
  font-family: verdana, arial, helvetica;
  font-size: 12pt;
  a:link, a:visited, a:active {
      text-decoration: none;
      color: black;
  }
  a:hover { color:red; }

  margin: 0;
  display: flex;
  justify-content: center; /* Horizontal centering */
  align-items: center;     /* Vertical centering */
  min-height: 100vh;       /* Full viewport height */
  background-color: white;
}

.image-container {
  position: relative;
  width: 600px;  /* Adjust based on your image size */
  height: 338px;
}

.image-container img {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: auto;
  transition: opacity 0.5s ease; /* Smooth fade effect */
  transform: translateY(-25%); /* Moves image up by % of it's height */
}

.bottom-right-container {
    /* Positions the element relative to the browser window (viewport) */
    position: fixed;

    right: 0;        /* Aligns the right edge to the right edge of the window */
    bottom: 0;       /* Aligns the bottom edge to the bottom edge of the window */
    background-color: white;
    padding: 15px;
    border: 0px solid black;
    z-index: 1000;             /* Ensures the div is on top of other content */
}

</style>
</head>

<body>

    <div class="image-container">
        <img src="images/jmg-profile-logo.jpg" alt="JMG" class="img-back">
    </div>

    <!--div class="bottom-right-container">
        <a href="text.html">&lt;text&gt;</a>
    </div-->

</body>

</html>
